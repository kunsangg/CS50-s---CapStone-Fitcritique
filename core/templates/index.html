{% extends 'base.html' %}
{% block title %}FitCritic - AI Fashion Styling{% endblock %}

{% block auth_content %}
<div class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-[url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center bg-no-repeat relative">
    <div class="absolute inset-0 bg-black/70"></div>
    
    <div class="relative z-10 max-w-2xl">
        <h1 class="text-5xl md:text-7xl font-bold tracking-tighter text-white mb-6">
            Your personal <br/>
            <span class="text-indigo-400 italic">fashion critic.</span>
        </h1>
        <p class="text-xl text-zinc-300 mb-10 font-light">
            Upload an outfit. Get brutal, honest feedback, styling tips, and real product recommendations powered by AI.
        </p>
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="{% url 'register' %}" class="bg-white text-black font-semibold rounded-full px-8 py-3 text-lg hover:bg-zinc-200 transition duration-300 w-full sm:w-auto">
                Get Started
            </a>
            <a href="{% url 'login' %}" class="bg-transparent border border-zinc-500 text-white font-medium rounded-full px-8 py-3 text-lg hover:bg-zinc-800 transition duration-300 w-full sm:w-auto">
                Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
