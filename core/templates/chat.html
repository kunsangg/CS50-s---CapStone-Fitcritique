{% extends 'base.html' %}
{% load static %}
{% block title %}Chat - FitCritic{% endblock %}

{% block content %}
<div class="relative flex-1 flex flex-col h-full w-full overflow-hidden">
    
    <!-- Video Background -->
    <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover z-0">
        <source src="{% static 'videos/bg.mp4' %}" type="video/mp4">
    </video>
    <!-- Overlay for text readability -->
    <div class="absolute inset-0 bg-[#212121]/80 z-0 pointer-events-none"></div>
    
    <!-- Messages Scroll Area -->
    <div id="messages-container" class="relative z-10 flex-1 overflow-y-auto w-full custom-scrollbar pb-32">
        <div class="w-full max-w-[680px] mx-auto px-4 pt-10 pb-6 flex flex-col gap-6" id="messages">
            
            <!-- Empty State -->
            <div id="empty-state" class="flex flex-col items-center justify-center mt-16 md:mt-32 h-full z-10 relative">
                <div class="flex items-center justify-center mb-2">
                    <h1 class="text-5xl font-black text-white tracking-tighter">FitCritic</h1>
                </div>
                <p class="text-[11px] font-medium text-cyan-400/80 mb-12 uppercase tracking-[0.2em] text-center">Navigate the ocean of fashion</p>
                
                <div class="flex flex-wrap justify-center gap-3 w-full max-w-3xl px-4 mt-8">
                    <button class="suggestion-chip bg-black/20 hover:bg-black/40 border border-white/10 rounded-full px-4 py-2 text-sm text-[#a1a1aa] hover:text-white transition-all flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        <span>Rate my streetwear</span>
                    </button>
                    <button class="suggestion-chip bg-black/20 hover:bg-black/40 border border-white/10 rounded-full px-4 py-2 text-sm text-[#a1a1aa] hover:text-white transition-all flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                        <span>Office appropriate?</span>
                    </button>
                    <button class="suggestion-chip bg-black/20 hover:bg-black/40 border border-white/10 rounded-full px-4 py-2 text-sm text-[#a1a1aa] hover:text-white transition-all flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <span>Style these sneakers</span>
                    </button>
                    <button class="suggestion-chip bg-black/20 hover:bg-black/40 border border-white/10 rounded-full px-4 py-2 text-sm text-[#a1a1aa] hover:text-white transition-all flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                        <span>Dinner date outfit</span>
                    </button>
                </div>
            </div>
            
            <!-- Messages go here -->
            
        </div>
    </div>

    <!-- Composer -->
    <div class="absolute bottom-0 left-0 right-0 pt-2 pb-8 px-4 w-full z-20">
        <div class="max-w-[720px] mx-auto relative">
            
            <!-- Image Preview Area -->
            <div id="image-preview" class="hidden absolute bottom-full left-0 mb-3 bg-[#18181b]/80 backdrop-blur-md border border-white/10 rounded-xl p-2 w-32 h-32 group shadow-xl">
                <img id="preview-img" src="#" alt="Preview" class="w-full h-full object-cover rounded-lg">
                <button type="button" id="remove-image" class="absolute -top-2 -right-2 bg-[#27272a] text-white rounded-full p-1 shadow-lg hover:bg-red-500 transition opacity-0 group-hover:opacity-100">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="chat-form" class="relative bg-[#18181b]/60 backdrop-blur-xl rounded-full shadow-2xl border border-white/5 focus-within:border-white/20 transition-all flex items-center px-4 py-2">
                {% csrf_token %}
                <input type="file" id="image-input" accept="image/*" class="hidden">
                
                <button type="button" id="attach-btn" onclick="document.getElementById('image-input').click()" class="p-2 text-[#a1a1aa] hover:text-white rounded-full transition-colors shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
                
                <textarea id="composer-input" name="message" rows="1" class="w-full bg-transparent text-white placeholder-[#a1a1aa] outline-none resize-none px-3 py-[9px] max-h-[150px] overflow-y-auto custom-scrollbar text-sm" placeholder="Search styles, describe outfits..."></textarea>
                
                <button type="button" id="send-btn" class="p-2 bg-transparent text-[#a1a1aa] hover:text-white rounded-full transition-colors shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/chat.js' %}"></script>
{% endblock %}
